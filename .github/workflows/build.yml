name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# 显式声明权限：需要 contents: write 才能创建 Release
permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact_name: AI桌面宠物-mac
            artifact_pattern: |
              release/*.dmg
          - os: windows-latest
            platform: win
            artifact_name: AI桌面宠物-win
            artifact_pattern: |
              release/*.exe
          - os: ubuntu-latest
            platform: linux
            artifact_name: AI桌面宠物-linux
            artifact_pattern: |
              release/*.AppImage

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: 🐧 Install Linux deps (for AppImage)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools zsync

      - name: 📦 Install dependencies
        run: npm ci --no-audit --no-fund

      - name: 🔍 Debug list files
        shell: bash
        run: |
          ls -la
          echo "--- build dir ---"
          ls -la build/ 2>/dev/null || echo "no build dir"

      - name: 🔧 Build app for ${{ matrix.platform }}
        run: npx electron-builder --${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: warn
          retention-days: 30

      - name: 🚀 Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_pattern }}
          draft: true
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
